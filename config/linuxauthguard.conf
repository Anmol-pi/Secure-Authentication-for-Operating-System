{
  "_comment": "LinuxAuthGuard master configuration — /etc/linuxauthguard/linuxauthguard.conf",

  "general": {
    "log_level": "info",
    "data_dir":  "/var/lib/linuxauthguard",
    "log_dir":   "/var/log/linuxauthguard",
    "run_dir":   "/run/linuxauthguard",
    "config_dir":"/etc/linuxauthguard"
  },

  "greeter": {
    "enabled": true,
    "wallpaper": "/usr/share/linuxauthguard/wallpaper.jpg",
    "show_clock": true,
    "show_user_avatar": true,
    "lockout_display_countdown": true,
    "max_fail_before_shake": 1,
    "session_service": "linuxauthguard"
  },

  "file_auth": {
    "enabled": true,
    "vault_db": "/var/lib/linuxauthguard/vault.db",
    "fuse_mount_base": "/run/linuxauthguard/mounts",
    "session_timeout_seconds": 300,
    "recursive_by_default": true,
    "ipc_socket": "/run/linuxauthguard/vault_auth.sock",
    "argon2_time_cost": 3,
    "argon2_memory_kb": 65536,
    "argon2_parallelism": 2
  },

  "ml": {
    "enabled": true,
    "model_path": "/var/lib/linuxauthguard/model.pkl",
    "retrain_interval_hours": 24,
    "sensitivity_threshold": 0.80,
    "watch_roots": ["/home", "/root", "/etc", "/var"],
    "max_queue_size": 2000,
    "notification_cooldown_seconds": 3600
  },

  "sudo_tracker": {
    "enabled": true,
    "db_path": "/var/lib/linuxauthguard/sudo_log.db",
    "socket_path": "/run/linuxauthguard/sudo_events.sock",
    "fallback_log": "/var/log/linuxauthguard/sudo_fallback.log",
    "dashboard_host": "127.0.0.1",
    "dashboard_port": 7474,
    "burst_window_seconds": 60,
    "burst_threshold": 10,
    "unusual_hour_sigma": 2.5
  },

  "pam_module": {
    "lockout_db": "/var/lib/linuxauthguard/lockout.db",
    "audit_log": "/var/log/linuxauthguard/auth.log",
    "max_fail_attempts": 5,
    "lockout_duration_seconds": 1800,
    "totp_window": 1,
    "session_ttl_seconds": 3600
  }
}
